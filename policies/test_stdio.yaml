agent: claude

mode: readonly

collections:
  allow:
    - user
    - user_group_details
    - user_preference
    - user_dashboard_preference
    - role_details
    - assignment_details
    - delegation_details
    - project
    - master_account
    - master_account_billing
    - master_account_billing_transactions
    - background_jobs
    - background_jobs_configuration
    - background_jobs_log
    - currency_configuration_v2
    - executive_dashboard_assignment
    - executive_dashboard_definition_acls
    - executive_dashboard_definition_versions
    - executive_dashboard_definitions
    - executive_dashboard_reports
    - executive_dashboard_saved_views
    - migrations
  deny:
    - zzz_archived__currency_configuration_v2
    - zzz_archived__delegation_details
    - zzz_archived__executive_dashboard_definition_acls
    - zzz_archived__executive_dashboard_definition_versions
    - zzz_archived__executive_dashboard_definitions
    - zzz_archived__executive_dashboard_saved_views
    - zzz_archived__role_details
    - Copy_of_master_account_billing_transactions_22_dec_25
    - Copy_of_role_details

actions:
  allow:
    - find
    - count
    - aggregate
    - collection_schema
    - collection_indexes
    - list_databases
    - db_stats
    - explain

mask_fields:
  - password
  - password_hash
  - secret
  - token
  - api_key
  - access_token
  - refresh_token
