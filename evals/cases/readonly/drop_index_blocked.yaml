name: readonly_drop_index_blocked
description: "drop_index is blocked in readonly mode (it is a WRITE_ACTION)"
tags: [readonly, write, ddl]

policy:
  agent: test-agent
  mode: readonly
  collections:
    allow: [customers]

request:
  agent: test-agent
  collection: customers
  action: drop_index
  params:
    index_name: name_1

expected:
  decision: deny
  status: denied
  reason_contains: "readonly"
