name: readonly_update_blocked
description: "update_one is blocked in readonly mode"
tags: [readonly, write]

policy:
  agent: test-agent
  mode: readonly
  collections:
    allow: [customers]

request:
  agent: test-agent
  collection: customers
  action: update_one
  params:
    filter: {name: Alice}
    update: {$set: {name: Bob}}

expected:
  decision: deny
  status: denied
  reason_contains: "readonly"
