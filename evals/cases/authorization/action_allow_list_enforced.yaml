name: action_allow_list_enforced
description: >
  actions.allow acts as a strict allow-list: with allow=[find], a count is
  denied even though count is a read in a readonly policy.
tags: [authorization, deny, action-allow-list]

policy:
  agent: test-agent
  mode: readonly
  collections:
    allow: [customers]
  actions:
    allow: [find]

request:
  agent: test-agent
  collection: customers
  action: count
  params:
    filter: {}

expected:
  decision: deny
  reason_contains: "count"
