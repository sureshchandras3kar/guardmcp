services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  guardmcp:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # Fix 1: operator sets agent identity — never the AI client
      GUARDMCP_AGENT: support-bot
      GUARDMCP_MONGODB_URI: mongodb://mongo:27017
      GUARDMCP_MONGODB_DATABASE: mydb
      GUARDMCP_TRANSPORT: streamable-http
      GUARDMCP_HOST: 0.0.0.0
      GUARDMCP_PORT: "8000"
      GUARDMCP_APPROVAL_PORT: "8001"
    ports:
      - "8000:8000"   # MCP endpoint
      - "8001:8001"   # Approval REST API
    volumes:
      - ./policies:/app/policies:ro
      - ./logs:/app/logs

volumes:
  mongo_data:
